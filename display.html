<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Reveal</title>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      overflow: hidden; 
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #scene {
      position: absolute;
      left: 50%;
      bottom: -720px;
      width: 400px;
      transform: translateX(-50%);
      transition: bottom 1.1s cubic-bezier(0.25, 0.1, 0.25, 1);
      opacity: 0;
      z-index: 10;
    }

    #scene.show {
      bottom: 80px;
      opacity: 1;
    }

    .card-container {
      width: 100%;
      height: 530px;
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.85);
    }

    .back, .front {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
    }

    .back {
      background-size: cover;
      background-position: center;
      z-index: 10;
    }
    .back.default { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Back.png'); }
    .back.leader { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Leader.png'); }
    .back.don    { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Don.png'); }

    .front {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.9s ease-in;
    }

    .front.show {
      opacity: 1;
    }

    .front img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Floating Green Text - MAX z-index */
    .price-overlay {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ff88;
      text-align: center;
      text-shadow: 0 0 12px #00ff88, 0 0 25px #00ff88, 0 0 40px #00ff88;
      font-size: 22px;
      line-height: 1.3;
      white-space: nowrap;
      z-index: 100;           /* Very high */
      opacity: 0;
      transition: opacity 0.8s ease-in;
      pointer-events: none;
    }

    .price-overlay.show {
      opacity: 1;
    }

    .last-sold {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .prices {
      font-size: 27px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="scene">
    <div class="card-container">
      <!-- Back -->
      <div id="backFace" class="back default"></div>
      
      <!-- Front -->
      <div id="frontFace" class="front">
        <img id="cardImage" src="" alt="Card Art">
      </div>

      <!-- Green Text Floating Above -->
      <div id="priceOverlay" class="price-overlay">
        <div class="last-sold">LAST SOLD FOR</div>
        <div id="priceText" class="prices">ENG: $0.00 • JP: $0.00</div>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const backFace = document.getElementById('backFace');
    const frontFace = document.getElementById('frontFace');
    const priceOverlay = document.getElementById('priceOverlay');
    const priceText = document.getElementById('priceText');

    function animateCountUp(finalEng, finalJp) {
      let startTime = Date.now();
      const duration = 1600;
      const interval = setInterval(() => {
        const progress = Math.min((Date.now() - startTime) / duration, 1);
        const currentEng = (finalEng * progress).toFixed(2);
        const currentJp = (finalJp * progress).toFixed(2);
        priceText.textContent = `ENG: $${currentEng} • JP: $${currentJp}`;
        if (progress >= 1) clearInterval(interval);
      }, 16);
    }

    function showCardReveal(data = {}) {
      console.log("🎴 Reveal triggered:", data);

      let backClass = "default";
      const nameLower = (data.name || "").toLowerCase();
      if (data.cardTypeKey === "leader" || nameLower.includes("leader")) backClass = "leader";
      else if (data.cardTypeKey === "don" || nameLower.includes("don") || nameLower.includes("dawn")) backClass = "don";

      backFace.className = `back ${backClass}`;

      document.getElementById('cardImage').src = data.image || "https://picsum.photos/id/237/380/530";

      // Reset
      scene.classList.remove('show');
      frontFace.classList.remove('show');
      priceOverlay.classList.remove('show');

      // Rise with back
      setTimeout(() => {
        scene.classList.add('show');
      }, 100);

      // Reveal front + text
      setTimeout(() => {
        frontFace.classList.add('show');
        priceOverlay.classList.add('show');

        const engPrice = parseFloat(data.engPrice) || 0;
        const jpPrice = parseFloat(data.jpPrice) || 0;
        animateCountUp(engPrice, jpPrice);
      }, 1100);

      // Drop down
      setTimeout(() => {
        scene.style.bottom = '-720px';
        setTimeout(() => {
          scene.classList.remove('show');
          frontFace.classList.remove('show');
          priceOverlay.classList.remove('show');
        }, 1300);
      }, 10500);
    }

    window.showCardReveal = showCardReveal;

    console.log("✅ Text forced to top layer - should now appear above the card");
  </script>
</body>
</html>
