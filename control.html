<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Check Control</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f19; color: #fff; padding: 30px; text-align: center; }
    input, button, select { padding: 14px; font-size: 18px; margin: 10px; border-radius: 8px; }
    input { width: 520px; background: #1f1f2e; color: #fff; border: 2px solid #00ff9d; }
    button { background: #00ff9d; color: #000; border: none; font-weight: bold; cursor: pointer; }
    #status { margin-top: 20px; font-size: 16px; min-height: 30px; color: #00ff9d; }
    .api-key { width: 400px !important; font-family: monospace; }
  </style>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
  <div>
    <h2>One Piece Price Check Control</h2>
    
    <div>
      <strong>tcgpricelookup API Key:</strong><br>
      <input type="text" id="apiKey" class="api-key" placeholder="tcg_xxxxxxxxxxxxxxxx" value="">
      <button onclick="saveApiKey()">Save Key</button>
      <small style="display:block; margin-top:5px; color:#888;">Get it free at <a href="https://tcgpricelookup.com" target="_blank">tcgpricelookup.com</a> (Trader plan for eBay Last Sold)</small>
    </div>

    <div>
      <strong>Currency:</strong> 
      <select id="currency">
        <option value="AUD" selected>AUD</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
    </div>

    <input type="text" id="command" placeholder=":pc OP05-123 AA" autofocus>
    <br>
    <button onclick="processCommand()">🔥 SEND TO DISPLAY</button>

    <div id="status"></div>
  </div>

  <script>
    // ←←← PASTE YOUR FIREBASE CONFIG HERE (same as display.html)
    const firebaseConfig = { /* your config object */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const revealRef = db.ref('currentReveal');

    // Load saved API key
    let apiKey = localStorage.getItem('tcgpricelookupKey') || '';
    document.getElementById('apiKey').value = apiKey;

    function saveApiKey() {
      apiKey = document.getElementById('apiKey').value.trim();
      localStorage.setItem('tcgpricelookupKey', apiKey);
      document.getElementById("status").innerHTML = "✅ API key saved!";
    }

    async function processCommand() {
      const cmd = document.getElementById("command").value.trim();
      if (!cmd.toLowerCase().startsWith(":pc")) {
        document.getElementById("status").innerHTML = "❌ Must start with :pc";
        return;
      }

      if (!apiKey) {
        document.getElementById("status").innerHTML = "❌ Enter your tcgpricelookup API key first!";
        return;
      }

      document.getElementById("status").innerHTML = "Fetching card data & prices...";

      const parts = cmd.toLowerCase().replace(":pc", "").trim().split(/\s+/);
      let cardNum = null;
      let hint = null;
      for (let p of parts) {
        if (/^[a-z0-9]+-\d+$/.test(p)) cardNum = p.toUpperCase();
        if (['aa','alt','parallel','sp','manga'].includes(p)) hint = p;
      }

      if (!cardNum) {
        document.getElementById("status").innerHTML = "❌ No card number found";
        return;
      }

      try {
        // 1. Get basic card info + image from free OPTCGAPI
        const optcgRes = await fetch(`https://www.optcgapi.com/api/sets/card/${cardNum}`);
        const optcgData = await optcgRes.json();
        const cards = Array.isArray(optcgData) ? optcgData : [optcgData];
        let selected = cards[0];

        // Prefer alternate art if user typed AA/ALT/PARALLEL
        if (hint && (hint === 'aa' || hint === 'alt' || hint === 'parallel')) {
          const alt = cards.find(c => 
            (c.card_name || "").toLowerCase().includes("parallel") ||
            (c.card_name || "").toLowerCase().includes("alt")
          );
          if (alt) selected = alt;
        }

        const nameLower = (selected.card_name || "").toLowerCase();
        let cardTypeKey = "default";
        if (nameLower.includes("leader")) cardTypeKey = "leader";
        else if (nameLower.includes("don") || nameLower.includes("dawn")) cardTypeKey = "don";

        // 2. Get real prices from tcgpricelookup (eBay last sold preferred)
        const priceRes = await fetch(`https://api.tcgpricelookup.com/v1/cards/search?q=${cardNum}&game=onepiece`, {
          headers: { "X-API-Key": apiKey }
        });
        const priceData = await priceRes.json();

        let engPrice = 0;
        if (priceData && priceData.data && priceData.data.length > 0) {
          const prices = priceData.data[0].prices?.raw?.near_mint || {};
          // Prefer eBay 7-day sold average (true "Last Sold For")
          engPrice = prices.ebay?.avg_7d || prices.tcgplayer?.market || 0;
        }

        const revealData = {
          name: selected.card_name || "Unknown Card",
          number: cardNum,
          printing: hint ? "Alternate Art" : "Regular",
          engPrice: engPrice.toString(),
          jpPrice: "0.00",
          image: selected.card_image || priceData.data?.[0]?.image_url || "",
          cardTypeKey: cardTypeKey
        };

        // SEND TO DISPLAY
        await revealRef.set(revealData);

        const priceDisplay = engPrice > 0 ? `$${engPrice.toFixed(2)}` : "—";
        document.getElementById("status").innerHTML = `✅ Sent: ${selected.card_name} — LAST SOLD ≈ ${priceDisplay}`;
        document.getElementById("command").value = "";

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerHTML = `❌ Error: ${err.message}`;
      }
    }

    document.getElementById("command").addEventListener("keypress", e => {
      if (e.key === "Enter") processCommand();
    });
  </script>
</body>
</html>
