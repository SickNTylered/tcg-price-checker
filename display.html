<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Reveal</title>
  <style>
    body { margin:0; background: rgba(0,0,0,0) !important; overflow: hidden; }
    #scene { position: absolute; left: 80px; bottom: 100px; width: 720px; }
    .card { width: 100%; height: 420px; position: relative; transition: transform 1.2s ease-in-out; transform-style: preserve-3d; }
    .card.show-front { transform: rotateY(180deg); }
    .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 18px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
    .back { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .back.leader { background: linear-gradient(135deg, #8b0000, #4b0000); }
    .back.don    { background: linear-gradient(135deg, #ffd700, #b8860b); }
    .front { background: #111; transform: rotateY(180deg); display: flex; align-items: center; gap: 25px; padding: 25px; }
    .front img { width: 240px; border-radius: 12px; border: 4px solid #ffd700; box-shadow: 0 0 30px #ffd700; }
    .info { color: white; flex: 1; }
    .name { font-size: 26px; font-weight: bold; margin: 0 0 8px 0; }
    .details { font-size: 18px; opacity: 0.9; }
    .price { font-size: 28px; font-weight: bold; color: #00ff9d; line-height: 1.3; }
  </style>
</head>
<body>
  <div id="scene">
    <div id="card" class="card">
      <div id="backFace" class="face back"></div>
      <div class="face front">
        <img id="cardImage" src="https://picsum.photos/id/237/240/340" alt="Card">
        <div class="info">
          <div class="name" id="name">Card Name</div>
          <div class="details" id="details">Printing • LANG</div>
          <div class="price" id="price">ENG: $XX AUD • JP: $XX AUD</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    const backFace = document.getElementById('backFace');
    const imgElement = document.getElementById('cardImage');

    const channel = new BroadcastChannel('card_reveal_channel');

    function showCardReveal(data = {}) {
      console.log("🎴 Reveal triggered:", data);

      backFace.className = `face back ${data.cardTypeKey || 'default'}`;

      // Pre-set image (reduces flash)
      let imageUrl = data.image || "https://picsum.photos/id/237/240/340";
      imgElement.src = imageUrl;  // Set early
      imgElement.onerror = () => imgElement.src = "https://picsum.photos/id/237/240/340";

      document.getElementById('name').textContent = `${data.name || "Unknown"} (${data.number || "OPXX-XXX"})`;
      document.getElementById('details').textContent = `${data.printing || "Regular"} • ${data.lang || "ENG"}`;

      // Dual price display
      let priceText = `ENG: $${data.engPrice || "N/A"} ${data.currency || "AUD"}`;
      if (data.jpPrice && data.jpPrice !== "N/A") {
        priceText += ` • JP: $${data.jpPrice} ${data.currency || "AUD"}`;
      }
      document.getElementById('price').textContent = priceText;

      // Flip after a tiny delay for smoother feel
      card.classList.remove('show-front');
      void card.offsetWidth;
      setTimeout(() => card.classList.add('show-front'), 80);
    }

    channel.onmessage = (event) => {
      if (event.data && event.data.type === 'reveal') showCardReveal(event.data.data);
    };

    window.showCardReveal = showCardReveal;
    console.log("✅ Display ready with dual prices + smoother image");
  </script>
</body>
</html>
