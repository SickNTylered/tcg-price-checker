<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Reveal</title>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      overflow: hidden; 
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #scene {
      position: absolute;
      left: 50%;
      width: 400px;
      transform: translateX(-50%);
      transition: top 1.8s cubic-bezier(0.25, 0.1, 0.25, 1);
      z-index: 10;
    }

    .card-container {
      width: 100%;
      height: 530px;
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }

    .back, .front {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
    }

    .back {
      background-size: cover;
      background-position: center;
    }
    .back.default { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Back.png'); }
    .back.leader { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Leader.png'); }
    .back.don    { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Don.png'); }

    .front {
      opacity: 0;
      transition: opacity 0.9s ease-in;
    }

    .front.show {
      opacity: 1;
    }

    .front img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Text below card */
    #priceOverlay {
      position: absolute;
      top: 555px;
      left: 50%;
      transform: translateX(-50%);
      color: #00cc66;
      text-align: center;
      white-space: nowrap;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.8s ease-in;
    }

    #priceOverlay.show {
      opacity: 1;
    }

    .last-sold {
      font-size: 50px;
      font-weight: bold;
      margin-bottom: 8px;
      color: white;
    }

    .prices {
      font-size: 60px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="scene">
    <div class="card-container">
      <!-- Back -->
      <div id="backFace" class="back default"></div>
      
      <!-- Front -->
      <div id="frontFace" class="front">
        <img id="cardImage" src="" alt="Card Art">
      </div>
    </div>

    <!-- Text -->
    <div id="priceOverlay">
      <div class="last-sold">LAST SOLD FOR</div>
      <div id="priceText" class="prices">ENG: $0.00 JP: $0.00</div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const backFace = document.getElementById('backFace');
    const frontFace = document.getElementById('frontFace');
    const priceOverlay = document.getElementById('priceOverlay');
    const priceText = document.getElementById('priceText');

    function animateCountUp(finalEng, finalJp) {
      let startTime = Date.now();
      const duration = 1600;
      const interval = setInterval(() => {
        const progress = Math.min((Date.now() - startTime) / duration, 1);
        const currentEng = (finalEng * progress).toFixed(2);
        const currentJp = (finalJp * progress).toFixed(2);
        priceText.textContent = `ENG: $${currentEng} JP: $${currentJp}`;
        if (progress >= 1) clearInterval(interval);
      }, 16);
    }

    async function showCardReveal(data = {}) {
      console.log("New reveal started", data);

      // Dynamic back
      let backClass = "default";
      const nameLower = (data.name || "").toLowerCase();
      if (data.cardTypeKey === "leader" || nameLower.includes("leader")) backClass = "leader";
      else if (data.cardTypeKey === "don" || nameLower.includes("don") || nameLower.includes("dawn")) backClass = "don";

      backFace.className = `back ${backClass}`;
      document.getElementById('cardImage').src = data.image || "https://picsum.photos/id/237/380/530";

      // Reset everything
      scene.style.top = '120%';           // Start below screen
      frontFace.classList.remove('show');
      priceOverlay.classList.remove('show');

      // 1. ON TRIGGER: Start with back at bottom
      setTimeout(() => {
        scene.style.transition = 'top 1.8s cubic-bezier(0.25, 0.1, 0.25, 1)';
        scene.style.top = '50%';           // Move up to center while still back
      }, 4000);   // Wait 4 seconds before moving up

      // 2. After reaching top, wait 7 seconds on back
      setTimeout(() => {
        frontFace.classList.add('show');
        priceOverlay.classList.add('show');

        const engPrice = parseFloat(data.engPrice) || 0;
        const jpPrice = parseFloat(data.jpPrice) || 0;
        animateCountUp(engPrice, jpPrice);
      }, 4000 + 1800 + 7000);   // 4s wait + 1.8s move + 7s hold on back

      // 3. Hold final frame for 14 seconds then slide back down
      setTimeout(() => {
        scene.style.transition = 'top 1.8s cubic-bezier(0.25, 0.1, 0.25, 1)';
        scene.style.top = '120%';   // Slide back down
        setTimeout(() => {
          frontFace.classList.remove('show');
          priceOverlay.classList.remove('show');
        }, 2000);
      }, 4000 + 1800 + 7000 + 14000);   // Total hold time
    }

    // Listen for control panel updates
    window.addEventListener('storage', (e) => {
      if (e.key === 'revealData' && e.newValue) {
        showCardReveal(JSON.parse(e.newValue));
      }
    });

    window.showCardReveal = showCardReveal;
    console.log("✅ New timing: 4s wait → slide up with back → 7s on back → reveal + text → 14s hold → slide down");
  </script>
</body>
</html>
