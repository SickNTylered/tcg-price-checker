<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Check Control</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f19; color: #fff; padding: 30px; text-align: center; }
    .container { max-width: 620px; margin: 0 auto; }
    h2 { color: #00ff9d; }
    input, button, select { padding: 14px; font-size: 18px; margin: 10px; border-radius: 8px; }
    input { width: 520px; background: #1f1f2e; color: #fff; border: 2px solid #00ff9d; }
    button { background: #00ff9d; color: #000; border: none; font-weight: bold; cursor: pointer; }
    select { background: #1f1f2e; color: #fff; border: 2px solid #00ff9d; width: 200px; }
    #status { margin-top: 20px; font-size: 16px; min-height: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>One Piece Price Check Control</h2>
    
    <div style="margin-bottom:20px;">
      <strong>Currency:</strong> 
      <select id="currency">
        <option value="AUD" selected>AUD - Australian Dollar</option>
        <option value="USD">USD - US Dollar</option>
        <option value="EUR">EUR - Euro</option>
        <option value="GBP">GBP - British Pound</option>
        <option value="JPY">JPY - Japanese Yen</option>
      </select>
    </div>

    <p>Paste chat command</p>
    <input type="text" id="command" placeholder=":pc OP05-001 AA" autofocus>
    <br>
    <button onclick="processCommand()">🔥 FETCH & REVEAL ON STREAM</button>

    <div id="status"></div>
  </div>

  <script>
    const channel = new BroadcastChannel('card_reveal_channel');

    async function getExchangeRate(toCurrency) {
      if (toCurrency === "USD") return 1;
      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/USD`);
        const data = await res.json();
        return data.rates[toCurrency] || 1;
      } catch (e) {
        console.warn("Currency conversion failed");
        return 1;
      }
    }

    async function processCommand() {
      const cmd = document.getElementById("command").value.trim();
      if (!cmd.toLowerCase().startsWith(":pc")) {
        document.getElementById("status").innerHTML = "❌ Must start with :pc";
        return;
      }

      const selectedCurrency = document.getElementById("currency").value;
      document.getElementById("status").innerHTML = `Fetching + converting to ${selectedCurrency}...`;

      const parts = cmd.toLowerCase().replace(":pc", "").trim().split(/\s+/);
      let cardNum = null;
      let isAlt = false;
      for (let p of parts) {
        if (/^[a-z0-9]+-\d+$/.test(p)) cardNum = p.toUpperCase();
        if (['aa','alt','parallel','p1','sp'].includes(p)) isAlt = true;
      }
      if (!cardNum) {
        document.getElementById("status").innerHTML = "❌ No card number";
        return;
      }

      try {
        const res = await fetch(`https://optcgapi.com/api/sets/card/${cardNum}/`);
        if (!res.ok) throw new Error("Card not found");
        const cards = await res.json();

        let selected = cards.find(c => 
          (isAlt && c.card_name.toLowerCase().includes("alternate")) || 
          (!isAlt && !c.card_name.toLowerCase().includes("alternate"))
        ) || cards[0];

        const nameLower = selected.card_name.toLowerCase();
        let cardTypeKey = "default";
        if (selected.rarity === "L" || nameLower.includes("leader")) cardTypeKey = "leader";
        else if (nameLower.includes("don") || nameLower.includes("dawn")) cardTypeKey = "don";

        const rate = await getExchangeRate(selectedCurrency);
        const usdEng = selected.market_price || 0;
        const convertedEng = (usdEng * rate).toFixed(2);

        // JP price (if available in OPTCG or fallback)
        let jpPrice = "N/A";
        if (selected.jp_market_price) {
          jpPrice = (selected.jp_market_price * rate).toFixed(2);
        }

        const dataToSend = {
          name: selected.card_name,
          number: selected.card_set_id,
          printing: isAlt ? "Alternate Art" : "Regular",
          engPrice: convertedEng,
          jpPrice: jpPrice,
          lang: "ENG",
          image: selected.card_image,
          cardTypeKey: cardTypeKey,
          currency: selectedCurrency
        };

        console.log("📤 Sending to display:", dataToSend);
        channel.postMessage({ type: 'reveal', data: dataToSend });

        document.getElementById("status").innerHTML = `✅ Revealed in ${selectedCurrency}`;
        document.getElementById("command").value = "";

      } catch (err) {
        document.getElementById("status").innerHTML = `❌ ${err.message}`;
        console.error(err);
      }
    }

    document.getElementById("command").addEventListener("keypress", e => {
      if (e.key === "Enter") processCommand();
    });
  </script>
</body>
</html>
