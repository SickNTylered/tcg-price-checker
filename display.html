<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Reveal</title>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      overflow: hidden; 
      perspective: 1600px; 
    }

    #scene {
      position: absolute;
      left: 50%;
      bottom: -700px;
      width: 380px;
      transform: translateX(-50%);
      transition: bottom 1.05s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #scene.show {
      bottom: 90px;
    }

    .card {
      width: 100%;
      height: 530px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.75s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .card.show-front {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.85);
    }

    /* Card Backs */
    .back {
      background-size: cover;
      background-position: center;
      background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Back.png');
    }
    .back.leader {
      background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Leader.png');
    }
    .back.don {
      background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Don.png');
    }

    .front {
      background: #0a0a14;
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .front img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sparkles {
      position: absolute; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: radial-gradient(circle, rgba(255,215,0,0.8) 15%, transparent 65%);
      opacity: 0;
      pointer-events: none;
      animation: sparkleAnim 2.3s ease-out forwards;
    }

    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0.5); }
      40%  { opacity: 1; }
      100% { opacity: 0; transform: scale(1.45); }
    }
  </style>
</head>
<body>
  <div id="scene">
    <div id="card" class="card">
      <!-- Back -->
      <div id="backFace" class="face back"></div>
      
      <!-- Front - Full card art only -->
      <div class="face front">
        <img id="cardImage" src="" alt="Card Art">
        <div class="sparkles"></div>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const card = document.getElementById('card');
    const backFace = document.getElementById('backFace');

    function showCardReveal(data = {}) {
      console.log("🎴 Reveal triggered:", data);

      // Dynamic back
      let backClass = "default";
      const nameLower = (data.name || "").toLowerCase();
      if (data.cardTypeKey === "leader" || nameLower.includes("leader")) backClass = "leader";
      else if (data.cardTypeKey === "don" || nameLower.includes("don") || nameLower.includes("dawn")) backClass = "don";

      backFace.className = `face back ${backClass}`;

      // Set full card art (no green bar)
      document.getElementById('cardImage').src = data.image || "https://picsum.photos/id/237/380/530";

      // Reset
      scene.classList.remove('show');
      card.classList.remove('show-front');

      // 1. Rise from bottom with back facing
      setTimeout(() => {
        scene.classList.add('show');
      }, 80);

      // 2. Flip to front
      setTimeout(() => {
        card.classList.add('show-front');
        document.querySelector('.sparkles').style.animation = 'sparkleAnim 2.3s ease-out forwards';
      }, 1050);

      // 3. Drop back down after ~10 seconds
      setTimeout(() => {
        scene.style.bottom = '-700px';
        setTimeout(() => {
          scene.classList.remove('show');
          card.classList.remove('show-front');
        }, 1300);
      }, 10500);
    }

    window.showCardReveal = showCardReveal;

    console.log("✅ Clean flip version - full card art, rise from bottom, one flip, then drop down");
  </script>
</body>
</html>
