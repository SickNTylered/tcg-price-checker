<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Reveal</title>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      overflow: hidden; 
      perspective: 1600px; 
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #scene {
      position: absolute;
      left: 50%;
      bottom: -680px;
      width: 380px;
      transform: translateX(-50%);
      transition: bottom 1s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #scene.show {
      bottom: 90px;
    }

    .card {
      width: 100%;
      height: 530px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .card.show-front {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.85);
    }

    /* Card Backs */
    .back {
      background-size: cover;
      background-position: center;
      background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Back.png');
    }
    .back.leader {
      background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Leader.png');
    }
    .back.don {
      background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Don.png');
    }

    .front {
      background: #0a0a14;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
    }

    .front img {
      width: 100%;
      height: 390px;
      object-fit: contain;
      border-bottom: 8px solid #00cc66;
    }

    .details-bar {
      background: #00cc66;
      color: #000;
      padding: 16px 20px;
      font-size: 21px;
      line-height: 1.25;
      text-align: left;
    }

    .name { 
      font-size: 27px; 
      font-weight: bold; 
      margin-bottom: 6px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .info-line { 
      font-size: 19px; 
      margin: 4px 0;
    }

    .sparkles {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      background: radial-gradient(circle, rgba(255,215,0,0.75) 15%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      animation: sparkleAnim 2.2s ease-out forwards;
    }

    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0.6); }
      35%  { opacity: 1; }
      100% { opacity: 0; transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div id="scene">
    <div id="card" class="card">
      <!-- Back - starts visible -->
      <div id="backFace" class="face back"></div>
      
      <!-- Front -->
      <div class="face front">
        <img id="cardImage" src="" alt="Card Art">
        <div class="details-bar">
          <div class="name" id="name">Card Name (OPXX-XXX)</div>
          <div class="info-line" id="details">Printing • ENG</div>
          <div class="info-line" id="price">ENG: $00.00 • JP: $00.00</div>
        </div>
        <div class="sparkles"></div>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const card = document.getElementById('card');
    const backFace = document.getElementById('backFace');

    function showCardReveal(data = {}) {
      console.log("🎴 Reveal triggered:", data);

      // Set dynamic back
      let backClass = "default";
      const nameLower = (data.name || "").toLowerCase();
      if (data.cardTypeKey === "leader" || nameLower.includes("leader")) backClass = "leader";
      else if (data.cardTypeKey === "don" || nameLower.includes("don") || nameLower.includes("dawn")) backClass = "don";

      backFace.className = `face back ${backClass}`;

      // Set card art
      const img = document.getElementById('cardImage');
      img.src = data.image || "https://picsum.photos/id/237/380/390";
      img.onerror = () => img.src = "https://picsum.photos/id/237/380/390";

      // Set text
      document.getElementById('name').textContent = `${data.name || "Unknown Card"} (${data.number || "OPXX-XXX"})`;
      document.getElementById('details').textContent = `${data.printing || "Regular"} • ${data.lang || "ENG"}`;
      document.getElementById('price').textContent = `ENG: $${data.engPrice || "N/A"} • JP: $${data.jpPrice || "N/A"}`;

      // Reset animation
      scene.classList.remove('show');
      card.classList.remove('show-front');

      // Step 1: Rise from bottom with back facing
      setTimeout(() => {
        scene.classList.add('show');
      }, 50);

      // Step 2: Flip to front after rising
      setTimeout(() => {
        card.classList.add('show-front');
        document.querySelector('.sparkles').style.animation = 'sparkleAnim 2.2s ease-out forwards';
      }, 900);

      // Step 3: Drop back down after ~10 seconds
      setTimeout(() => {
        scene.style.bottom = '-680px';
        setTimeout(() => {
          scene.classList.remove('show');
          card.classList.remove('show-front');
        }, 1200);
      }, 10500);
    }

    window.showCardReveal = showCardReveal;

    console.log("✅ Fixed display - now starts with back, rises cleanly, flips once, then drops down");
  </script>
</body>
</html>
