<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Check Control</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f19; color: #fff; padding: 30px; text-align: center; }
    input, button { padding: 14px; font-size: 18px; margin: 10px; border-radius: 8px; }
    input { width: 520px; background: #1f1f2e; color: #fff; border: 2px solid #00ff9d; }
    button { background: #00ff9d; color: #000; border: none; font-weight: bold; cursor: pointer; }
    #status { margin-top: 20px; font-size: 16px; min-height: 30px; color: #00ff9d; }
  </style>
</head>
<body>
  <div>
    <h2>One Piece Price Check Control</h2>
    <p>Paste command from chat:</p>
    <input type="text" id="command" placeholder=":pc OP05-123 AA" autofocus>
    <br>
    <button onclick="processCommand()">🔥 FETCH & REVEAL ON STREAM</button>

    <div id="status"></div>
  </div>

  <script>
    async function processCommand() {
      const cmd = document.getElementById("command").value.trim();
      if (!cmd.toLowerCase().startsWith(":pc")) {
        document.getElementById("status").innerHTML = "❌ Must start with :pc";
        return;
      }

      document.getElementById("status").innerHTML = "Fetching...";

      const parts = cmd.toLowerCase().replace(":pc", "").trim().split(/\s+/);
      let cardNum = null;
      let hint = null;
      for (let p of parts) {
        if (/^[a-z0-9]+-\d+$/.test(p)) cardNum = p.toUpperCase();
        if (['aa','alt','parallel','sp','manga'].includes(p)) hint = p;
      }

      if (!cardNum) {
        document.getElementById("status").innerHTML = "❌ No card number found";
        return;
      }

      try {
        // Get card art + info
        const res = await fetch(`https://www.optcgapi.com/api/sets/card/${cardNum}`);
        const data = await res.json();
        const card = Array.isArray(data) ? data[0] : data;

        if (!card) throw new Error("Card not found");

        const nameLower = (card.card_name || "").toLowerCase();
        let cardTypeKey = "default";
        if (card.rarity === "L" || nameLower.includes("leader")) cardTypeKey = "leader";
        else if (nameLower.includes("don") || nameLower.includes("dawn")) cardTypeKey = "don";

        const revealUrl = `http://127.0.0.1:5500/display.html?name=${encodeURIComponent(card.card_name)}` +
          `&number=${encodeURIComponent(cardNum)}` +
          `&printing=${encodeURIComponent(hint ? "Alternate Art" : "Regular")}` +
          `&engPrice=48.50` +   // TODO: Replace with real price later
          `&jpPrice=25.00` +
          `&image=${encodeURIComponent(card.card_image || "")}` +
          `&cardTypeKey=${cardTypeKey}`;

        window.open(revealUrl, '_blank');

        document.getElementById("status").innerHTML = `✅ Opened reveal for ${card.card_name}`;
        document.getElementById("command").value = "";

      } catch (err) {
        document.getElementById("status").innerHTML = `❌ Error: ${err.message}`;
      }
    }

    document.getElementById("command").addEventListener("keypress", e => {
      if (e.key === "Enter") processCommand();
    });
  </script>
</body>
</html>
