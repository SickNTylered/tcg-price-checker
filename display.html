<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Piece Price Reveal</title>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      overflow: hidden; 
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
    }

    #scene {
      position: absolute;
      left: 50%;
      bottom: -700px;
      width: 380px;
      transform: translateX(-50%);
      transition: bottom 1.1s cubic-bezier(0.25, 0.1, 0.25, 1);
      opacity: 0;
    }

    #scene.show {
      bottom: 90px;
      opacity: 1;
    }

    .card {
      width: 100%;
      height: 530px;
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.85);
    }

    .back {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }
    .back.leader { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Leader.png'); }
    .back.don    { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Don.png'); }
    .back.default { background-image: url('https://raw.githubusercontent.com/SickNTylered/tcg-price-checker/main/Back.png'); }

    .front {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.6s ease-in;
    }

    .front.show {
      opacity: 1;
    }

    .front img {
      width: 100%;
      height: 390px;
      object-fit: contain;
      border-bottom: 8px solid #00cc66;
    }

    .details-bar {
      background: #00cc66;
      color: #000;
      padding: 16px 20px;
      font-size: 21px;
      line-height: 1.25;
      text-align: left;
      flex: 1;
    }

    .name { 
      font-size: 27px; 
      font-weight: bold; 
      margin-bottom: 6px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .info-line { 
      font-size: 19px; 
      margin: 4px 0;
    }

    .sparkles {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      background: radial-gradient(circle, rgba(255,215,0,0.75) 15%, transparent 70%);
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="scene">
    <div id="card" class="card">
      <!-- Back -->
      <div id="backFace" class="back default"></div>
      
      <!-- Front -->
      <div id="frontFace" class="front">
        <img id="cardImage" src="" alt="Card Art">
        <div class="details-bar">
          <div class="name" id="name">Card Name (OPXX-XXX)</div>
          <div class="info-line" id="details">Printing • ENG</div>
          <div class="info-line" id="price">ENG: $00.00 • JP: $00.00</div>
        </div>
        <div id="sparkles" class="sparkles"></div>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const backFace = document.getElementById('backFace');
    const frontFace = document.getElementById('frontFace');
    const sparkles = document.getElementById('sparkles');

    function showCardReveal(data = {}) {
      console.log("🎴 Reveal triggered:", data);

      // Dynamic back
      let backClass = "default";
      const nameLower = (data.name || "").toLowerCase();
      if (data.cardTypeKey === "leader" || nameLower.includes("leader")) backClass = "leader";
      else if (data.cardTypeKey === "don" || nameLower.includes("don") || nameLower.includes("dawn")) backClass = "don";

      backFace.className = `back ${backClass}`;

      // Set card art
      document.getElementById('cardImage').src = data.image || "https://picsum.photos/id/237/380/390";

      // Set text
      document.getElementById('name').textContent = `${data.name || "Unknown Card"} (${data.number || "OPXX-XXX"})`;
      document.getElementById('details').textContent = `${data.printing || "Regular"} • ${data.lang || "ENG"}`;
      document.getElementById('price').textContent = `ENG: $${data.engPrice || "N/A"} • JP: $${data.jpPrice || "N/A"}`;

      // Reset
      scene.classList.remove('show');
      frontFace.classList.remove('show');
      sparkles.style.animation = 'none';

      // 1. Rise from bottom with back visible
      setTimeout(() => {
        scene.classList.add('show');
      }, 100);

      // 2. Flip to front (reveal)
      setTimeout(() => {
        frontFace.classList.add('show');
        sparkles.style.animation = 'sparkleAnim 2.2s ease-out forwards';
      }, 1100);

      // 3. Drop back down after 10 seconds
      setTimeout(() => {
        scene.style.bottom = '-700px';
        setTimeout(() => {
          scene.classList.remove('show');
          frontFace.classList.remove('show');
        }, 1200);
      }, 10500);
    }

    // Add the keyframe for sparkles
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes sparkleAnim {
        0%   { opacity: 0; transform: scale(0.6); }
        35%  { opacity: 1; }
        100% { opacity: 0; transform: scale(1.4); }
      }
    `;
    document.head.appendChild(style);

    window.showCardReveal = showCardReveal;

    console.log("✅ New animation method - should rise with back, reveal front cleanly, then drop down");
  </script>
</body>
</html>
